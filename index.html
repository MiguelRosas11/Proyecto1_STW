<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="layout">

    <aside class="create-panel">
      <h2>Crear Post</h2>
      <p>Configura tu perfil y publica un mensaje.</p>

      <div class="mini-profile">
        <div class="profile-avatar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v1c0 .552.448 1 1 1h14c.552 0 1-.448 1-1v-1c0-2.761-3.582-5-8-5z"/>
          </svg>
        </div>

        <div class="profile-name-box">
          <label for="profileNameInput">Nombre de usuario</label>
          <input
            id="profileNameInput"
            type="text"
            placeholder="Escribe tu nombre"
            maxlength="40"
          >
        </div>
      </div>

      <textarea id="postInput" placeholder="Escribe tu mensaje..."></textarea>

      <button id="publishBtn" type="button">Publicar</button>

      <div id="createFeedback"></div>
    </aside>

    <section class="posts-panel">

      <div id="listView" class="view-section">
        <div class="search-bar">
          <select id="searchType">
            <option value="text">Buscar por texto</option>
            <option value="author">Buscar por autor</option>
            <option value="id">Buscar por ID</option>
          </select>

          <input id="searchInput" type="text" placeholder="Buscar post">
          <button id="searchBtn" type="button">Buscar</button>
          <button id="clearBtn" type="button">Mostrar todos</button>
        </div>

        <div class="posts-wrapper">
          <div id="uiState" class="ui-state"></div>
          <div id="postsContainer" class="posts-container"></div>
          <div id="paginationControls" class="pagination"></div>
        </div>
      </div>

      <div id="detailView" class="detail-overlay hidden" aria-hidden="true">
        <div id="detailBackdrop" class="detail-backdrop"></div>

        <div id="detailModal" class="detail-modal">
          <button id="backToPostsBtn" type="button" class="back-btn">← Volver</button>

          <div class="detail-card">
            <p id="detailMeta" class="detail-meta"></p>

            <div class="detail-user">
              <img id="detailAvatar" class="detail-avatar" src="" alt="Foto de perfil">

              <div class="detail-user-info">
                <p id="detailAuthor" class="detail-author"></p>
                <p id="detailUsername" class="detail-username"></p>
              </div>
            </div>

            <p id="detailBody" class="detail-body"></p>
          </div>
        </div>
      </div>

    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
