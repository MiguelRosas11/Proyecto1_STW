<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="layout">

    <aside class="create-panel">
      <h2>Crear Post</h2>
      <p>Configura tu perfil y publica un mensaje.</p>

      <section id="authSection" class="auth-section">
        <div class="auth-tabs">
          <button id="loginTabBtn" type="button" class="auth-tab active-tab">Iniciar sesión</button>
          <button id="registerTabBtn" type="button" class="auth-tab">Crear cuenta</button>
        </div>
      
        <form id="loginForm" class="auth-form">
          <label for="loginUsernameInput">Usuario</label>
          <input
            id="loginUsernameInput"
            type="text"
            placeholder="Ingresa tu usuario"
            maxlength="20"
            autocomplete="username"
          >
      
          <label for="loginPasswordInput">Contraseña</label>
          <input
            id="loginPasswordInput"
            type="password"
            placeholder="Ingresa tu contraseña"
            maxlength="40"
            autocomplete="current-password"
          >
      
          <button type="submit">Entrar</button>
        </form>
      
        <form id="registerForm" class="auth-form hidden">
          <label for="registerNameInput">Nombre visible</label>
          <input
            id="registerNameInput"
            type="text"
            placeholder="Escribe tu nombre"
            maxlength="40"
          >
      
          <label for="registerUsernameInput">Usuario</label>
          <input
            id="registerUsernameInput"
            type="text"
            placeholder="Crea un usuario"
            maxlength="20"
          >
      
          <label for="registerPasswordInput">Contraseña</label>
          <input
            id="registerPasswordInput"
            type="password"
            placeholder="Crea una contraseña"
            maxlength="40"
          >
      
          <button type="submit">Crear cuenta</button>
        </form>
      
        <div id="authFeedback"></div>
      </section>

      <section id="sessionSection" class="session-section hidden">
        <div class="mini-profile">
          <div class="profile-avatar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v1c0 .552.448 1 1 1h14c.552 0 1-.448 1-1v-1c0-2.761-3.582-5-8-5z"/>
            </svg>
          </div>
      
          <div class="profile-name-box">
            <label>Sesión actual</label>
            <div id="sessionName" class="session-name">Usuario</div>
            <div id="sessionUsername" class="session-username">@usuario</div>
          </div>
        </div>
      
        <button id="logoutBtn" type="button" class="danger-btn">Cerrar sesión</button>
      </section>
      

      <textarea id="postInput" placeholder="Escribe tu mensaje..."></textarea>

      <button id="publishBtn" type="button">Publicar</button>

      <div id="createFeedback"></div>
    </aside>

    <section class="posts-panel">

      <div id="listView" class="view-section">
        <div class="search-bar">
          <select id="searchType">
            <option value="text">Buscar por texto</option>
            <option value="author">Buscar por autor</option>
            <option value="id">Buscar por ID</option>
          </select>

          <input id="searchInput" type="text" placeholder="Buscar post">
          <button id="searchBtn" type="button">Buscar</button>
          <button id="clearBtn" type="button">Mostrar todos</button>
        </div>

        <div class="posts-wrapper">
          <div id="uiState" class="ui-state"></div>
          <div id="postsContainer" class="posts-container"></div>
          <div id="paginationControls" class="pagination"></div>
        </div>
      </div>

      <div id="detailView" class="detail-overlay hidden" aria-hidden="true">
        <div id="detailBackdrop" class="detail-backdrop"></div>

        <div id="detailModal" class="detail-modal">
          <button id="backToPostsBtn" type="button" class="back-btn">← Volver</button>

          <div class="detail-card">
            <p id="detailMeta" class="detail-meta"></p>

            <div class="detail-user">
              <img id="detailAvatar" class="detail-avatar" src="" alt="Foto de perfil">

              <div class="detail-user-info">
                <p id="detailAuthor" class="detail-author"></p>
                <p id="detailUsername" class="detail-username"></p>
              </div>
            </div>

            <p id="detailBody" class="detail-body"></p>
          </div>
        </div>
      </div>

    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
